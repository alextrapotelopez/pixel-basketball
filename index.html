<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Court</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="scoreboard" aria-label="Scoreboard">
        <div>
          <span class="team-title">
            <span class="team-badge" id="homeTeamLogo" aria-hidden="true"><img alt="" /></span>
            <span class="label" id="homeTeamLabel">Home (You)</span>
          </span>
          <strong id="homeScore">0</strong>
        </div>
        <div>
          <span class="label">Clock</span>
          <strong id="clock">02:00</strong>
        </div>
        <div>
          <span class="team-title">
            <span class="team-badge" id="awayTeamLogo" aria-hidden="true"><img alt="" /></span>
            <span class="label" id="awayTeamLabel">Away</span>
          </span>
          <strong id="awayScore">0</strong>
        </div>
      </section>

      <div class="court-wrap">
        <canvas id="court" width="960" height="540" aria-label="Pixel basketball court"></canvas>
        <section class="team-picker" id="teamPicker" aria-label="Choose your team">
          <div class="team-picker-panel">
            <span class="label">Choose Your Team</span>
            <h1>Pixel Court</h1>
            <label class="select-label" for="teamSelect">Your team</label>
            <select id="teamSelect" aria-label="Your NBA team"></select>
            <label class="select-label" for="opponentTeamSelect">Other team</label>
            <select id="opponentTeamSelect" aria-label="Other NBA team"></select>
            <button id="startGame" type="button">Start Game</button>
          </div>
        </section>
      </div>

      <section class="hud" aria-label="Game controls and player status">
        <div class="meter">
          <span>Shot</span>
          <div class="meter-track"><i id="shotMeter"></i></div>
        </div>
        <div class="controls">
          <kbd>WASD</kbd><span>Move</span>
          <kbd>Space</kbd><span>Hold + release to shoot</span>
          <kbd>C</kbd><span>Dunk</span>
          <kbd>E</kbd><span>Pass</span>
          <kbd>Q</kbd><span>Steal</span>
          <kbd>F</kbd><span>Block</span>
          <kbd>Shift</kbd><span>Sprint</span>
          <kbd>R</kbd><span>Restart</span>
        </div>
      </section>

      <section class="stats-panel" aria-label="Player stats">
        <div>
          <span class="label" id="homeStatsLabel">Home Stats</span>
          <div class="stats-list" id="homeStats"></div>
        </div>
        <div>
          <span class="label" id="awayStatsLabel">Away Stats</span>
          <div class="stats-list" id="awayStats"></div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite">Tip-off. Create space and shoot.</div>

    <script src="game.js"></script>
  </body>
</html>
